name: Dispatch web data sync

on:
  # release trigger temporarily disabled — automatic web sync after latest-data publish is paused.
  # release:
  #   types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to include in dispatch payload"
        required: false
        default: "latest-data"
      target_env:
        description: "Target environment expected by web workflow"
        required: false
        default: "dev"

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Validate dispatch token availability
        env:
          WEB_REPO_DISPATCH_TOKEN: ${{ secrets.WEB_REPO_DISPATCH_TOKEN }}
        run: |
          if [ -z "${WEB_REPO_DISPATCH_TOKEN}" ]; then
            echo "Missing required secret: WEB_REPO_DISPATCH_TOKEN"
            exit 1
          fi

      - name: Trigger repository_dispatch in web repository
        env:
          WEB_REPO_DISPATCH_TOKEN: ${{ secrets.WEB_REPO_DISPATCH_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_ID: ''
          TARGET_ENV: ${{ inputs.target_env }}
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${WEB_REPO_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/sdgviz/observatorio-tarragona-web/dispatches \
            -d "$(cat <<EOF
          {
            "event_type": "data_release_published",
            "client_payload": {
              "source_repository": "sdgviz/observatorio-tarragona-datos",
              "release_tag": "${RELEASE_TAG}",
              "release_id": "${RELEASE_ID}",
              "target_env": "${TARGET_ENV}"
            }
          }
          EOF
          )"
