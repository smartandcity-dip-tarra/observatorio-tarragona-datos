# Pipeline: descarga Sheets → commit dataset → check CSV → transform → release .db → reportes como artifact
# Ver docs_internal/arquitectura-datos-despliegue.md

name: Update dataset

on:
  schedule:
    - cron: "0 6 * * 1"   # cada lunes a las 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write   # commit dataset/, crear release

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create pipeline logs directory
        run: mkdir -p pipeline-logs

      # --- Paso 1: Python — download_and_build.py ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r pullAndBuild/requirements.txt

      - name: Download sheets & compute aggregates
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          set -o pipefail
          python pullAndBuild/download_and_build.py 2>&1 | tee pipeline-logs/step1-download.log

      # --- Paso 2: Commit dataset/ ---
      - name: Commit dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dataset/
          git diff --staged --quiet && echo "No changes in dataset/" || (git commit -m "chore(data): update dataset from Google Sheets" && git push)

      # --- Paso 3: check:csv ---
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
        working-directory: transform

      - name: Run CSV integrity checks
        run: |
          set -o pipefail
          pnpm run check:csv 2>&1 | tee "$GITHUB_WORKSPACE/pipeline-logs/step2-check-csv.log"
        working-directory: transform

      # --- Paso 4: transform ---
      - name: Transform CSVs to SQLite
        run: |
          set -o pipefail
          pnpm run transform 2>&1 | tee "$GITHUB_WORKSPACE/pipeline-logs/step3-transform.log"
        working-directory: transform

      # --- Paso 5: Build release source bundle aligned with DB ---
      - name: Build release source bundle
        run: |
          set -euo pipefail
          rm -f output/latest-data-source.zip
          zip -rq output/latest-data-source.zip dataset transform config openspec README.md

      # --- Paso 6: Release output/ (tag latest-data) ---
      - name: Create/update release (tag latest-data)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-data
          name: "Latest dataset"
          files: |
            output/diputacion_tarragona.db
            output/latest-data-source.zip
          replace_assets: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Paso 7: Subir reporte y logs como artifact descargable ---
      - name: Upload report and logs artifact
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: csv-integrity-report
          path: |
            docs/csv-integrity
            pipeline-logs
